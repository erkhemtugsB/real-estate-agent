    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This error occurs when some libraries try to polyfill fetch in an environment
      // where it's already defined as a read-only property.
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: () => originalFetch,
          set: () => { /* No-op to prevent TypeError */ },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        // If we can't redefine it, just ignore
      }
